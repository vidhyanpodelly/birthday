<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letters For You</title>

<style>

/* ---------- BASE ---------- */
html, body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

/* ---------- PAGE ---------- */
.page{
  display:none;
  min-height:100dvh;
  width:100%;
  position:relative;
}

.show{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* ---------- STORY FULLSCREEN ---------- */
.fullscreen{
  width:100%;
  height:100dvh;
  object-fit:cover;
}

/* ---------- BUTTONS ---------- */
button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.yes{
  background:#c92f4a;
  color:white;
}

.no{
  background:#444;
  color:white;
}

.back{
  position:fixed;
  top:20px;
  left:15px;
  background:black;
  color:white;
  z-index:10;
}

/* ---------- START ---------- */
#start .buttons{
  position:absolute;
  bottom:80px;
  display:flex;
  gap:20px;
}

/* ---------- SAD ---------- */
.sadText{
  font-size:24px;
  margin-bottom:20px;
}

/* ---------- LETTERS ---------- */
#letters{
  background:#f4f1ec;
  justify-content:flex-start;
  padding-top:20px;
}

.grid{
  width:100%;
  max-width:600px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:15px;
}

.letter img{
  width:100%;
}

.label{
  text-align:center;
  font-size:18px;
}

/* ---------- MOBILE ---------- */
@media (max-width:600px){
  .grid{
    gap:15px;
  }
}

</style>
</head>

<body>

<!-- START -->
<div id="start" class="page show">
  <img src="start.png" class="fullscreen">
  <div class="buttons">
    <button class="yes" onclick="go('letters')">Yes</button>
    <button class="no" onclick="go('sad')">No</button>
  </div>
</div>

<!-- SAD -->
<div id="sad" class="page show">
  <div class="sadText">Why did you click No 😭</div>
  <button class="yes" onclick="go('start')">Try Again</button>
</div>

<!-- LETTERS -->
<div id="letters" class="page">
  <h2>Letters for you 💌</h2>

  <div class="grid">

    <div class="letter" onclick="openLetter(1)">
      <img id="l1" src="closed.png">
      <div class="label">Letter 1</div>
    </div>

    <div class="letter" onclick="openLetter(2)">
      <img id="l2" src="closed.png">
      <div class="label">Letter 2</div>
    </div>

    <div class="letter" onclick="openLetter(3)">
      <img id="l3" src="closed.png">
      <div class="label">Letter 3</div>
    </div>

    <div class="letter" onclick="openLetter(4)">
      <img id="l4" src="closed.png">
      <div class="label">Letter 4</div>
    </div>

  </div>
</div>

<!-- CONTENT -->
<div id="c1" class="page">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page1.png" class="fullscreen">
</div>

<div id="c2" class="page">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page2.png" class="fullscreen">
</div>

<div id="c3" class="page">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page3.png" class="fullscreen">
</div>

<div id="c4" class="page">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page4.png" class="fullscreen">
</div>


<script>

/* navigation */
function go(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

/* keep opened */
let opened=[false,false,false,false];

function openLetter(n){
  opened[n-1]=true;
  document.getElementById("l"+n).src="opened.png";
  setTimeout(()=>{ go("c"+n); },300);
}

</script>

</body>
</html>
