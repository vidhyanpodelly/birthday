<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Letters For You</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* hide pages */
.page{
  display:none;
  padding:20px;
  text-align:center;
}
.show{
  display:block;
}

/* start */
.start img{
  width:100%;
  max-width:400px;
  border-radius:10px;
}

.buttons{
  margin-top:20px;
}

button{
  padding:12px 18px;
  font-size:16px;
  border:none;
  border-radius:8px;
  margin:8px;
  cursor:pointer;
}

.yes{background:#c92f4a;color:white;}
.no{background:#444;color:white;}

/* sad */
.sadText{
  font-size:22px;
  margin-bottom:20px;
}

/* letters */
#letters{
  background:#f4f1ec;
  min-height:100vh;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.letter img{
  width:100%;
}

.label{
  font-size:16px;
}

/* content pages */
.content img{
  width:100%;
  border-radius:10px;
}

.back{
  margin-bottom:15px;
  background:black;
  color:white;
}

</style>
</head>

<body>

<!-- START -->
<div id="start" class="page start show">
  <img src="start.png">
  <div class="buttons">
    <button class="yes" onclick="go('letters')">Yes</button>
    <button class="no" onclick="go('sad')">No</button>
  </div>
</div>

<!-- SAD -->
<div id="sad" class="page">
  <div class="sadText">Why did you click No 😭</div>
  <button class="yes" onclick="go('start')">Try Again</button>
</div>

<!-- LETTERS -->
<div id="letters" class="page">
  <h2>Letters for you 💌</h2>

  <div class="grid">
    <div class="letter" onclick="openLetter(1)">
      <img id="l1" src="closed.png">
      <div class="label">Letter 1</div>
    </div>

    <div class="letter" onclick="openLetter(2)">
      <img id="l2" src="closed.png">
      <div class="label">Letter 2</div>
    </div>

    <div class="letter" onclick="openLetter(3)">
      <img id="l3" src="closed.png">
      <div class="label">Letter 3</div>
    </div>

    <div class="letter" onclick="openLetter(4)">
      <img id="l4" src="closed.png">
      <div class="label">Letter 4</div>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div id="c1" class="page content">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page1.png">
</div>

<div id="c2" class="page content">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page2.png">
</div>

<div id="c3" class="page content">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page3.png">
</div>

<div id="c4" class="page content">
  <button class="back" onclick="go('letters')">Back</button>
  <img src="page4.png">
</div>

<script>
function go(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

let opened=[false,false,false,false];

function openLetter(n){
  opened[n-1]=true;
  document.getElementById("l"+n).src="opened.png";
  setTimeout(()=>go("c"+n),200);
}
</script>

</body>
</html>
